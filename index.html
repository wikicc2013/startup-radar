<title>转型有术 · AI青梅—创业公司数据库</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root{ }
  body{
    background:#EFF4F9;
    background-image:linear-gradient(#D5E2EF66 1px, transparent 1px),linear-gradient(90deg,#D5E2EF66 1px, transparent 1px);
    background-size:28px 28px;
    color:#0E2E52;
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    font-size:14px; line-height:1.55;
  }
  .wrap{ max-width:1180px; margin:0 auto; padding:20px 16px 60px; }

  /* ── 图签栏（工程图纸 title block）── */
  .titleblock{
    background:#fff; border:2px solid #123C6B; display:grid;
    grid-template-columns: 1fr auto auto auto; align-items:stretch;
  }
  .titleblock > div{ padding:14px 18px; border-left:1px solid #123C6B; }
  .titleblock > div:first-child{ border-left:none; }
  .tb-name h1{
    font-family:"Songti SC","STSong","SimSun",serif;
    font-size:22px; letter-spacing:2px; color:#123C6B; font-weight:700;
  }
  .tb-name p{ font-size:12px; color:#2F6FB1; margin-top:2px; letter-spacing:1px;}
  .tb-cell{ min-width:96px; }
  .tb-cell .k{ font-size:11px; color:#6B87A6; letter-spacing:1px; }
  .tb-cell .v{ font-family:ui-monospace,"SF Mono",Consolas,monospace; font-size:20px; font-weight:700; color:#123C6B; }
  .tb-cell .v small{ font-size:11px; font-weight:400; color:#6B87A6; }

  /* ── 统计条（点击即筛）── */
  .stats{ display:flex; flex-wrap:wrap; gap:8px; margin:14px 0; }
  .stat{
    background:#fff; border:1px solid #B9CDE0; padding:6px 14px; cursor:pointer;
    font-family:ui-monospace,"SF Mono",Consolas,monospace; font-size:13px; color:#0E2E52;
    user-select:none;
  }
  .stat b{ font-size:16px; margin-left:6px; }
  .stat.on{ background:#123C6B; color:#fff; border-color:#123C6B; }
  .stat .dot{ display:inline-block; width:9px; height:9px; margin-right:7px; }

  /* ── 主体：横向筛选栏 + 列表 ── */
  .main{ display:block; }
  .filterbar{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; background:#fff; border:1px solid #B9CDE0; padding:10px 12px; margin-bottom:12px; }
  .filterbar .fk{ font-size:12px; color:#6B87A6; letter-spacing:1px; }
  .fsel{ border:1px solid #B9CDE0; background:#EFF4F9; color:#0E2E52; padding:7px 10px; font-size:13px; outline:none; cursor:pointer; }
  .fsel:focus{ border-color:#2F6FB1; }
  .ftoggle{ border:1px solid #B9CDE0; background:#fff; color:#33517A; padding:7px 11px; font-size:12.5px; cursor:pointer; }
  .ftoggle.on{ background:#123C6B; color:#fff; border-color:#123C6B; }
  .filterbar #q{ width:auto; flex:1; min-width:220px; }
  .filterbar .reset{ width:auto; margin-top:0; margin-left:auto; }
  .rail{ background:#fff; border:1px solid #B9CDE0; padding:14px; position:sticky; top:12px; }
  .rail h3{ font-size:12px; color:#6B87A6; letter-spacing:2px; margin:12px 0 6px; font-weight:600;}
  .rail h3:first-child{ margin-top:0; }
  .chip{ display:block; width:100%; text-align:left; background:none; border:none; cursor:pointer;
    padding:5px 8px; font-size:13px; color:#0E2E52; border-left:3px solid transparent; }
  .chip:hover{ background:#EFF4F9; }
  .chip.on{ border-left-color:#B03A2E; background:#EFF4F9; font-weight:600; }
  .chip .n{ float:right; color:#6B87A6; font-family:ui-monospace,monospace; font-size:12px; }
  #q{ width:100%; border:1px solid #B9CDE0; padding:8px 10px; font-size:13px;
      background:#EFF4F9; color:#0E2E52; outline:none; }
  #q:focus{ border-color:#2F6FB1; }
  .reset{ margin-top:14px; width:100%; border:1px solid #B9CDE0; background:#fff; color:#2F6FB1;
      padding:7px; font-size:13px; cursor:pointer; }

  /* ── 公司行 ── */
  .list{ background:#fff; border:1px solid #B9CDE0; }
  .listhead{ display:flex; justify-content:space-between; align-items:center;
    padding:10px 16px; border-bottom:2px solid #123C6B; }
  .listhead .count{ font-family:ui-monospace,monospace; font-size:13px; color:#2F6FB1; }
  .row{ border-bottom:1px solid #E3ECF5; cursor:pointer; }
  .row:last-child{ border-bottom:none; }
  .rhead{ display:grid; grid-template-columns:44px 170px 1fr auto auto; gap:10px;
    align-items:center; padding:10px 16px; }
  .rhead:hover{ background:#F6FAFD; }
  .num{ font-family:ui-monospace,monospace; font-size:12px; color:#9FB3C8; }
  .name{ font-weight:600; color:#123C6B; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .name small{ display:block; font-weight:400; font-size:11px; color:#6B87A6; }
  .liner{ color:#33517A; font-size:13px; }
  .tier{ font-family:ui-monospace,monospace; font-size:11px; padding:2px 8px; color:#fff; letter-spacing:1px; white-space:nowrap;}
  .tA1{ background:#123C6B; } .tA2{ background:#2F6FB1; } .tB{ background:#6B87A6; } .tC{ background:#C1CFDD; color:#54708D; }

  /* ── 印章 ── */
  .seal{ font-size:11px; padding:3px 9px; border-radius:50% / 42%; white-space:nowrap; letter-spacing:1px; transform:rotate(-6deg); font-weight:600;}
  .s-reviewed{ border:2px solid #B03A2E; color:#B03A2E; }
  .s-auto{ border:2px solid #2F6FB1; color:#2F6FB1; }
  .s-researched{ border:2px dashed #B98116; color:#B98116; }
  .s-pending{ border:1px solid #9FB3C8; color:#6B87A6; transform:none; border-radius:0; font-weight:400;}
  .s-card{ border:1px solid #6B87A6; color:#54708D; transform:none; border-radius:0; font-weight:400;}
  .s-named{ color:#B9CDE0; border:none; transform:none; font-weight:400;}

  .detail{ display:none; padding:4px 16px 16px 70px; }
  .row.open .detail{ display:block; }
  .detail .en{ font-size:12px; color:#6B87A6; font-style:italic; margin-bottom:6px;}
  .detail .why{ font-size:13px; color:#0E2E52; background:#EFF4F9; border-left:3px solid #B03A2E;
    padding:8px 12px; margin-bottom:6px;}
  .detail .meta{ font-family:ui-monospace,monospace; font-size:12px; color:#6B87A6; }
  .detail a{ color:#2F6FB1; }
  .empty{ padding:40px; text-align:center; color:#6B87A6; }
  footer{ margin-top:16px; font-size:12px; color:#6B87A6; text-align:center; }

  @media (max-width:760px){
    .main{ grid-template-columns:1fr; }
    .rail{ position:static; }
    .titleblock{ grid-template-columns:1fr 1fr; }
    .tb-name{ grid-column:1 / -1; border-bottom:1px solid #123C6B; }
    .titleblock > div:nth-child(2){ border-left:none; }
    .rhead{ grid-template-columns:34px 1fr auto; }
    .liner{ display:none; }
    .detail{ padding-left:16px; }
    .detail .liner2{ display:block; font-size:13px; color:#33517A; margin-bottom:6px;}
  }
  @media (min-width:761px){ .detail .liner2{ display:none; } }
</style>

<script>
const TIER_LABEL={A1:"A1 制造直击",A2:"A2 组织范式",B:"B 速写卡",C:"C 记名"};
const STATUS_LABEL={pending:"待深研",researched:"待审核",reviewed:"正式档案",card:"速写卡",named:"记名"};
const SEAL={pending:"s-pending",researched:"s-researched",reviewed:"s-reviewed",card:"s-card",named:"s-named"};
function sealOf(c){ // 直通模式：reviewed 分「响哥审核」红章与「自动通过」蓝章
  if(c.status==="reviewed") return c.review==="approved"
    ? {cls:"s-reviewed",label:"响哥审核"} : {cls:"s-auto",label:"自动通过"};
  return {cls:SEAL[c.status],label:STATUS_LABEL[c.status]};
}
const TIER_DOT={A1:"#123C6B",A2:"#2F6FB1",B:"#6B87A6",C:"#C1CFDD"};

let DATA=null, THEMES=null, CHAIN_META=null;
const state={tier:null,chain:null,status:null,batch:null,q:"",funded:false,beacon:false,sort:"num"};

async function load(){
  try{
    const [r,t]=await Promise.all([fetch("./data/companies.json",{cache:"no-store"}),fetch("./data/themes.json",{cache:"no-store"})]);
    if(r.ok){ DATA=await r.json(); }
    if(t.ok){ THEMES=await t.json(); }
  }catch(e){ /* file:// 或离线时走内嵌快照 */ }
  if(!DATA){ DATA=JSON.parse(document.getElementById("fallback").textContent); }
  if(THEMES){ CHAIN_META=THEMES.themes; DATA.companies.forEach(c=>{ c.chainId=THEMES.assign[c.slug]||null; }); }
  init();
}
const RANK={高:3,中:2,低:1};
function isFunded(c){ return (c.funding||[]).some(f=>{const a=f.amount||"";return a&&!/^未披露/.test(a)&&/[\d]/.test(a)&&/[$€¥]|万|亿|美元|[MK]\b/i.test(a);}); }
function hasBeacon(c){ return (c.early_customers||[]).some(u=>u.confidence==="高"); }
function richOf(c){
  if(c.status!=="reviewed") return "";
  const parts=[];
  const f=(c.funding||[]).find(x=>/[\d]/.test(x.amount||"")&&!/^未披露/.test(x.amount||""));
  if(f) parts.push("💰 "+((f.round||"")+" "+(f.amount||"").split(/[（(]/)[0]).trim());
  const cs=(c.early_customers||[]).slice().sort((a,b)=>(RANK[b.confidence]||0)-(RANK[a.confidence]||0))[0];
  if(cs) parts.push("🏮 "+cs.name+"("+cs.confidence+")");
  if(c.investors&&c.investors.lead&&!/未披露/.test(c.investors.lead)) parts.push("🏦 领投 "+c.investors.lead);
  if((c.cn_benchmarks||[]).length) parts.push("🇨🇳 "+c.cn_benchmarks.slice(0,2).map(b=>String(b).split(/[、，,（(：:／\/]|——/)[0].trim()).join("、"));
  return parts.length?'<div class="why" style="border-left-color:#2F6FB1;background:#F2F7FB">'+parts.join("　·　")+'</div>':"";
}

function counts(list,key){ const m={}; list.forEach(c=>{const k=c[key]||"—"; m[k]=(m[k]||0)+1;}); return m; }

function init(){
  const cs=DATA.companies;
  document.getElementById("tb-total").innerHTML=cs.length+"<small> 家</small>";
  document.getElementById("tb-batches").innerHTML=DATA.meta.batches.length+"<small> 批</small>";
  document.getElementById("tb-updated").textContent=DATA.meta.updated;
  render();
}

function chip(host,key,val,label,n){
  const b=document.createElement("button");
  b.className="chip"+(state[key]===val?" on":"");
  b.innerHTML=label+'<span class="n">'+n+"</span>";
  b.onclick=()=>{ state[key]=(state[key]===val?null:val); render(); };
  host.appendChild(b);
}
function fillSel(id,key,opts,allLabel){
  const sel=document.getElementById(id); if(!sel) return;
  sel.innerHTML='<option value="">'+allLabel+'</option>'+opts.map(o=>'<option value="'+o.v+'"'+(state[key]===o.v?" selected":"")+'>'+o.label+(o.n!=null?" ("+o.n+")":"")+'</option>').join("");
  sel.onchange=()=>{ state[key]=sel.value||null; render(); };
}
function fillSort(){
  const sel=document.getElementById("s-sort"); if(!sel) return;
  sel.innerHTML=[["num","↕ 默认排序"],["fund","💰 融资降序"],["name","🔤 名称"]].map(([v,l])=>'<option value="'+v+'"'+(state.sort===v?" selected":"")+'>'+l+'</option>').join("");
  sel.onchange=()=>{ state.sort=sel.value; render(); };
}
function fundVal(c){ let v=0; (c.funding||[]).forEach(f=>{ const a=(f.amount||"").replace(/[, ]/g,""); let m; if(/亿/.test(a))v=Math.max(v,parseFloat(a)*1e8); else if(m=a.match(/([\d.]+)万/))v=Math.max(v,parseFloat(m[1])*1e4); else if(m=a.match(/[$€¥]?([\d.]+)M/i))v=Math.max(v,parseFloat(m[1])*1e6); else if(m=a.match(/[$€¥]?([\d.]+)K/i))v=Math.max(v,parseFloat(m[1])*1e3); else if(m=a.match(/[$€¥]([\d.]+)/))v=Math.max(v,parseFloat(m[1])); }); return v; }

function filtered(){
  const q=state.q.trim().toLowerCase();
  return DATA.companies.filter(c=>
    (!state.tier||c.tier===state.tier)&&
    (!state.chain||c.chainId===state.chain)&&
    (!state.status||c.status===state.status)&&
    (!state.batch||c.appeared_in.includes(state.batch))&&
    (!state.funded||isFunded(c))&&
    (!state.beacon||hasBeacon(c))&&
    (!q||(c.name+" "+c.one_liner_zh+" "+c.one_liner_en+" "+c.subcategory).toLowerCase().includes(q))
  );
}

function render(){
  const all=DATA.companies, f=filtered();

  // 统计条：档位（在其余筛选条件下计数）
  const base=all.filter(c=>
    (!state.chain||c.chainId===state.chain)&&(!state.status||c.status===state.status)&&
    (!state.batch||c.appeared_in.includes(state.batch))&&(!state.funded||isFunded(c))&&(!state.beacon||hasBeacon(c)));
  const tc=counts(base,"tier");
  const st=document.getElementById("stats"); st.innerHTML="";
  const allBtn=document.createElement("button");
  allBtn.className="stat"+(state.tier===null?" on":"");
  allBtn.innerHTML="全部<b>"+base.length+"</b>";
  allBtn.onclick=()=>{state.tier=null;render();};
  st.appendChild(allBtn);
  ["A1","A2","B","C"].forEach(t=>{
    const b=document.createElement("button");
    b.className="stat"+(state.tier===t?" on":"");
    b.innerHTML='<span class="dot" style="background:'+TIER_DOT[t]+'"></span>'+TIER_LABEL[t]+"<b>"+(tc[t]||0)+"</b>";
    b.onclick=()=>{ state.tier=(state.tier===t?null:t); render(); };
    st.appendChild(b);
  });

  // 筛选轨
  const cc={}; if(CHAIN_META) all.forEach(c=>{ if(c.chainId) cc[c.chainId]=(cc[c.chainId]||0)+1; });
  fillSel("s-chain","chain", CHAIN_META?CHAIN_META.filter(t=>cc[t.id]).map(t=>({v:t.id,label:t.emoji+" "+t.title,n:cc[t.id]})):[], "🔗 全部价值链");
  const sc=counts(all,"status");
  fillSel("s-status","status", ["pending","researched","reviewed","card","named"].filter(k=>sc[k]).map(k=>({v:k,label:STATUS_LABEL[k],n:sc[k]})), "📋 全部状态");
  fillSel("s-batch","batch", DATA.meta.batches.map(b=>({v:b.id,label:b.id+" · "+b.source.split("·")[0].trim(),n:b.total})), "📦 全部批次");
  fillSort();
  document.getElementById("tg-funded").className="ftoggle"+(state.funded?" on":"");
  document.getElementById("tg-beacon").className="ftoggle"+(state.beacon?" on":"");

  // 列表
  document.getElementById("count").textContent=f.length+" / "+all.length;
  const rows=document.getElementById("rows"); rows.innerHTML="";
  if(!f.length){ rows.innerHTML='<div class="empty">没有匹配的公司。清除部分筛选条件再试。</div>'; return; }
  const order={A1:0,A2:1,B:2,C:3};
  if(state.sort==="fund") f.sort((a,b)=>fundVal(b)-fundVal(a)||(a.num-b.num));
  else if(state.sort==="name") f.sort((a,b)=>a.name.localeCompare(b.name));
  else f.sort((a,b)=>(order[a.tier]-order[b.tier])||(a.num-b.num));
  f.forEach(c=>{
    const r=document.createElement("div"); r.className="row";
    const reappear=c.appeared_in.length>1?' · 再现×'+c.appeared_in.length:'';
    r.innerHTML=
      '<div class="rhead">'+
        '<span class="num">'+String(c.num).padStart(3,"0")+'</span>'+
        '<span class="name">'+c.name+'<small>'+c.category+(c.subcategory?" / "+c.subcategory:"")+'</small></span>'+
        '<span class="liner">'+c.one_liner_zh+'</span>'+
        '<span class="tier t'+c.tier+'">'+c.tier+'</span>'+
        (s=>'<span class="seal '+s.cls+'">'+s.label+'</span>')(sealOf(c))+
      '</div>'+
      '<div class="detail">'+
        '<span class="liner2">'+c.one_liner_zh+'</span>'+
        '<div class="en">'+c.one_liner_en+'</div>'+
        (c.triage_reason?'<div class="why">分诊理由：'+c.triage_reason+'</div>':"")+
        richOf(c)+
        '<div class="meta">批次 '+c.appeared_in.join(", ")+reappear+' · 更新 '+c.updated+
        (c.archive?' · <a href="'+c.archive.replace(/\.md$/,".html")+'" target="_blank">深研档案 →</a>':"")+'</div>'+
      '</div>';
    r.querySelector(".rhead").onclick=()=>r.classList.toggle("open");
    rows.appendChild(r);
  });
}

document.getElementById("q").addEventListener("input",e=>{ state.q=e.target.value; render(); });
document.getElementById("tg-funded").onclick=()=>{ state.funded=!state.funded; render(); };
document.getElementById("tg-beacon").onclick=()=>{ state.beacon=!state.beacon; render(); };
document.getElementById("reset").onclick=()=>{ state.tier=state.chain=state.status=state.batch=null; state.funded=state.beacon=false; state.sort="num"; state.q=""; document.getElementById("q").value=""; render(); };
load();
</script>
</body>
</html>
